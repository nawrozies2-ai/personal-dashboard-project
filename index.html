<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to external CSS -->
   
</head>
<body>
    <header>
        <h1>My Personal Dashboard</h1>
    </header>

    <main>
        <!-- Profile Card Section -->
        <section id="profile-card">
            <h2>Profile</h2>
            <p><strong>Name:</strong> <span id="display-name">Your Name</span></p>
            <p><strong>Email:</strong> <span id="display-email">your@email.com</span></p>
            <p><strong>Favorite Color:</strong> <span id="display-color">Blue</span></p>
        </section>

        <!-- User Input Form -->
        <section id="user-form">
            <h2>Update Profile</h2>
            <form id="profileForm">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required><br><br>

                <label for="color">Favorite Color:</label>
                <input type="color" id="color" value="#ADD8E6"><br><br>

                <button type="submit">Update Profile</button>
            </form>
        </section>

       <!--Add to do section here-->
       <section id="todo-section">
            <h2>My Tasks</h2>

            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addTaskBtn">Add Task</button>

            <br><br>

            <button id="sortTasks">Sort Tasks</button>
            <button id="showCompleted">Show Completed</button>
            <button id="showAll">Show All</button>

            <ul id="taskList"></ul>
        </section> 
        
        <!--fetch data section here-->
        <section id="fetcheddata">
            <h2>Fetched Data</h2>
            <button id="loadUsers">Load Users</button>
            <p id="statusMessage"></p>
            <ul id="apiDataList"></ul>
        </section>

    </main>

    <script src="dashboard_project.js"></script>
</body>
</html>
